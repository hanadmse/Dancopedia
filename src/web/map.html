<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance Map – Dancopedia Brazil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/map.css">
  <link rel="stylesheet" href="assets/css/toolbar.css">
  <script src="assets/js/toolbar.js" defer></script>
  <link rel="stylesheet" href="assets/css/Chatbox.css">
  <link rel="preload" href="assets/js/chatbox.js" as="script">
  <link rel="preload" href="assets/images/chatbox_face.jpg" as="image">
</head>
<body>
<div id="toolbar-container"></div>
<div id="breadcrumb-container"></div>
<div id="chatbox-container"></div>

<main>
  <div class="page-hero">
    <p class="ph-label">Explore</p>
    <h1>Dance Map</h1>
    <p>Click a pin to discover the dances from that region of Brazil.</p>
  </div>

  <div class="map-layout">

    <div class="map-col">
      <div class="map-container" id="mapContainer">
        <img src="assets/images/brazil-map.jpg" alt="Map of Brazil">
      </div>
    </div>

    <div class="map-panel" id="mapPanel">
      <div class="map-panel-idle" id="panelIdle">
        <p>Click a pin on the map to explore dances from that area.</p>
        <div class="region-links">
          <a href="regions/rio-de-janeiro?from=map" class="region-link">Rio de Janeiro</a>
          <a href="regions/northeastern-brazil?from=map" class="region-link">Northeastern Brazil</a>
          <a href="regions/pernambuco?from=map" class="region-link">Pernambuco</a>
          <a href="regions/bahia?from=map" class="region-link">Bahia</a>
        </div>
      </div>
      <div id="panelCard" style="display:none;"></div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="assets/js/breadcrumb.js"></script>
<script src="assets/js/map.js"></script>
</body>
</html>
