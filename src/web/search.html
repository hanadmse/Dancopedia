<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search – Dancopedia Brazil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/Search.css">
  <link rel="stylesheet" href="assets/css/toolbar.css">
  <script src="assets/js/toolbar.js" defer></script>
  <link rel="stylesheet" href="assets/css/Chatbox.css">
  <link rel="preload" href="assets/js/chatbox.js" as="script">
  <link rel="preload" href="assets/images/chatbox_face.jpg" as="image">
</head>
<body>
<div id="toolbar-container"></div>
<div id="breadcrumb-container"></div>
<div id="chatbox-container"></div>

<main>
  <div class="page-hero">
    <p class="ph-label">Archive</p>
    <h1>Search Dances</h1>
  </div>

  <div class="search-wrap">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name, region, or category…" aria-label="Search">
      <button onclick="searchDance()">Search</button>
    </div>
  </div>

  <div class="results-wrap">
    <p class="results-heading" id="resultsHeading" style="display:none">Results</p>
    <div id="danceContainer"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="assets/js/breadcrumb.js"></script>
<script src="assets/js/search.js"></script>
</body>
</html>
